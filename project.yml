name: PDFVoice
options:
  bundleIdPrefix: com.pdfvoice
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  PDFVoice:
    type: application
    platform: iOS
    sources:
      - PDFVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollsar.pdfvoice
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    info:
      path: PDFVoice/Info.plist
      properties:
        CFBundleDisplayName: PDF Voice
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # Разрешаем незашифрованный HTTP только к локальной сети (Silero на
        # http://localhost:8000). ATS по умолчанию блокирует cleartext HTTP —
        # без этого исключения запрос к Silero не уходит. Произвольный HTTP в
        # интернет НЕ разрешаем (NSAllowsArbitraryLoads не ставим).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true